<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>FY25-FY26 微信直充活动销售对比</title>
    <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: auto;
        }
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50%, 1fr));
            gap: 10px;
            max-width: 1200px;
            margin: 10px auto;
        }
        .chart-box {
            background: #fff;
            border-radius: 2px;
            padding: 1px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        .chart {
            width: 100%;
            height: 45vh;
        }
    </style>
</head>
<body>
<div class="chart-container">
    <div class="chart-box">
        <div id="lineChart" class="chart"></div>
    </div>
    <div class="chart-box">
        <div id="line2Chart" class="chart"></div>
    </div>
    <div class="chart-box">
        <div id="line3Chart" class="chart"></div>
    </div>
    <div class="chart-box">
        <div id="line4Chart" class="chart"></div>
    </div>
</div>
<script>
    const lineChart = echarts.init(document.getElementById('lineChart'));
    const line2Chart = echarts.init(document.getElementById('line2Chart'));
    const line3Chart = echarts.init(document.getElementById('line3Chart'));
    const line4Chart = echarts.init(document.getElementById('line4Chart'));

    // 颜色配置
    const colorMap = {
        'FY26 June': '#91cc75',
        'FY25 Labour Day holiday': '#8378EA',
        'FY25 summer holiday': '#37A2DA',
        'FY25 Labour Day holiday (Average)': '#8378EA',
        'FY25 summer holiday (Average)': '#37A2DA'
    };

    // JSON文件名（与HTML文件同目录）
    const DATA_FILE = 'data.json?v=' + new Date().getTime();

    // 默认数据 - 图表1
    let times = [];
    let seriesData = {};
    let MDFsales = 100;

    // 默认数据 - 图表2 (增粉数据)
    let followerSeriesData = {};

    // 默认数据 - 图表3 (ARPU)
    let arpuSeriesData = {};

    // 默认数据 - 图表4 (CC)
    let ccSeriesData = {};
    let ccTimes = {};

    // 加载JSON文件（返回数据但不更新图表）
    async function loadDataFile() {
        try {
            const response = await fetch(DATA_FILE);
            if (!response.ok) {
                console.warn(`未找到 ${DATA_FILE}，使用默认数据`);
                return false;
            }
            const data = await response.json();

            if (data.times && data.seriesData) {
                times = data.times;
                seriesData = data.seriesData;
                MDFsales = data.mdf;
            }

            // 加载增粉数据
            if (data.followerData) {
                // 只保留 FY26 June 增粉数量
                followerSeriesData = data.followerData;
            }

            // 加载ARPU数据
            if (data.arpuData) {
                arpuSeriesData = data.arpuData;
            }

            // 加载CC数据
            if (data.ccData) {
                ccSeriesData = data.ccData;
                ccTimes = data.ccTimes;
            }

            return true;
        } catch (error) {
            console.error('加载数据失败:', error);
            return false;
        }
    }

    // 构建series数据 - 图表1
    function buildSeries() {
        const result = Object.keys(seriesData).map(name => ({
            name: name,
            type: 'line',
            symbolSize: 6,
            itemStyle: {
                color: colorMap[name]
            },
            data: seriesData[name]
        }));
        return result;
    }

    // 构建series数据 - 图表2 (增粉)
    function buildFollowerSeries() {
        return Object.keys(followerSeriesData).map(name => ({
            name: name,
            type: 'line',
            symbolSize: 6,
            itemStyle: {
                color: '#91cc75'
            },
            data: followerSeriesData[name]
        }));
    }

    // 构建series数据 - 图表3 (ARPU)
    function buildARPUSeries() {
        const result = Object.keys(arpuSeriesData).map(name => {
            if (name === 'FY26 June') {
                const s = {
                    name: name,
                    type: 'line',
                    symbolSize: 6,
                    itemStyle: {
                        color: colorMap[name]
                    },
                    data: arpuSeriesData[name]
                };
                return s
            }else{
                const s = {
                    name: name,
                    type: 'line',
                    symbolSize: 0,
                    lineStyle: {
                        type: 'dashed',
                        width: 1
                    },
                    itemStyle: {
                        color: colorMap[name]
                    },
                    data: arpuSeriesData[name]
                };
                return s
            }

        });
        return result;
    }

    // 构建series数据 - 图表4 (CC)
    function buildCCSeries() {
        const result = Object.keys(ccSeriesData).map(name => ({
            name: name,
            type: 'line',
            symbolSize: 6,
            itemStyle: {
                color: colorMap[name]
            },
            data: ccSeriesData[name]
        }));
        return result;
    }

    // 更新图表
    function updateChart() {
        const FY26Data = seriesData['FY26 June'];

        // 构建series数据
        let series = Object.keys(seriesData).map(name => {
            const s = {
                name: name,
                type: 'line',
                symbolSize: 6,
                itemStyle: {
                    color: colorMap[name]
                },
                data: seriesData[name]
            };

            // 为 FY26 June 添加标注
            if (name === 'FY26 June' && FY26Data && FY26Data.length > 0) {
                const lastIndex = FY26Data.length - 1;
                const lastValue = FY26Data[lastIndex];
                const lastTime = times[lastIndex];

                // 最后一个节点显示在上方，其他显示在右侧
                const position = lastIndex >= (times.length - 5) ? 'insideBottomLeft' : 'insideBottomRight';
                const verticalAlign = position === 'insideBottomLeft' ? 'top' : 'top';
                const align = position === 'insideBottomLeft' ? 'right' : 'left';

                s.markPoint = {
                    symbol: 'circle',
                    symbolSize: 0,
                    label: {
                        show: true,
                        position: position,
                        verticalAlign:verticalAlign,
                        align: align,
                        formatter: 'Cumulative MDF :￥'+MDFsales,
                        color: '#91cc75',
                        fontSize: 14,
                        borderColor: '#91cc75',
                        borderWidth: 1,
                        borderRadius: 2,
                        padding: [3,5],
                        distance:-5
                    },
                    data: [
                        { type: 'max',
                        }
                    ]
                };
            }
            return s;
        });

        lineChart.setOption({
            xAxis: { data: times },
            series: series
        });

        // 更新图表2
        const followerSeries = buildFollowerSeries();
        line2Chart.setOption({
            xAxis: { data: times },
            series: followerSeries
        });

        // 更新图表3
        const arpuSeries = buildARPUSeries();
        line3Chart.setOption({
            xAxis: { data: times },
            series: arpuSeries
        });

        // 更新图表4
        const ccSeries = buildCCSeries();
        line4Chart.setOption({
            xAxis: { data: ccTimes },
            series: ccSeries
        });
    }

    // 检测是否为移动端
    function isMobile() {
        return window.innerWidth <= 768;
    }

    function initChart() {
        const series = buildSeries();
        const mobile = isMobile();
        const option = {
            backgroundColor: '#000000',
            textStyle: {
                color: '#ffffff',
                fontFamily: 'Helvetica',
                fontSize: mobile ? 12 : 14
            },
            title: {
                text: 'FY25-FY26 微信直充活动销售对比 (默认数据)',
                left: 'center',
                top: mobile ? 10 : 10,
                textStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 14 : 16
                }
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'cross',
                    label: {
                        backgroundColor: '#6a7985'
                    }
                },
                confine:true,
                backgroundColor: 'rgba(50,50,50,0.9)',
                borderColor: '#777',
                borderWidth: 1,
                textStyle: { color: '#fff' },
                formatter: function(params) {
                    let result = `<b>${params[0].axisValue}</b><br/>`;
                    let total = 0;
                    params.forEach(item => {
                        if (item.value > 0) {
                            result += `${item.marker} ${item.seriesName}: ${item.value}%<br/>`;
                            total += item.value;
                        }
                    });
                    return result;
                }
            },
            legend: {
                orient: mobile ? 'vertical':'horizontal',
                left: 'center',
                bottom: mobile ? '3%' : '5%',
                top: 'auto',
                itemGap: mobile ? 8 : 15,
                itemWidth: mobile ? 20 : 25,
                itemHeight: mobile ? 12 : 14,
                textStyle: {
                    color: '#ccc',
                    fontSize: mobile ? 10 : 14
                },
                pageTextStyle: { color: '#fff' },
                type: 'scroll'
            },
            grid: {
                left: mobile ? '5%' : '3%',
                right: mobile ? '5%' : '4%',
                top: mobile ? '20%' : '17%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: times,
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 14,
                    rotate: mobile ? 45 : 0
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: '',
                nameLocation: 'end',
                nameTextStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 10 : 14,
                    fontFamily: 'Helvetica',
                    align: 'right'
                },
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 14,
                    formatter: function(value) {
                        return value.toFixed(0)+"%";
                    }
                },
                splitLine: { lineStyle: { color: '#333333' } }
            },
            graphic: {
                elements: [{
                    type: 'text',
                    left: mobile ? '4%' : '2%',
                    top: mobile ? '12%' : '10%',
                    style: {
                        text: '销售占比（2025-04-29至05-06销售额为100%,AM=00:00-11:59,PM=12:00-23:59）',
                        fill: '#ffffff',
                        fontSize: mobile ? 10 : 14,
                        fontFamily: 'Helvetica'
                    }
                }]
            },
            series: series
        };

        lineChart.setOption(option);
    }

    // 初始化图表2 (增粉图表)
    function initFollowerChart() {
        const series = buildFollowerSeries();
        const mobile = isMobile();
        const option = {
            backgroundColor: '#000000',
            textStyle: {
                color: '#ffffff',
                fontFamily: 'Helvetica',
                fontSize: mobile ? 12 : 14
            },
            title: {
                text: 'FY26 June 官微累计增粉数据',
                left: 'center',
                top: mobile ? 20 : 20,
                textStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 14 : 16
                }
            },
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(50,50,50,0.9)',
                borderColor: '#777',
                borderWidth: 1,
                confine:true,
                textStyle: { color: '#fff' },
                formatter: function(params) {
                    let result = `<b>${params[0].axisValue}</b><br/>`;
                    params.forEach(item => {
                        result += `${item.marker} ${item.seriesName}: ${item.value}人<br/>`;
                    });
                    return result;
                }
            },
            legend: {
                orient: mobile ? 'vertical':'horizontal',
                left: 'center',
                bottom: mobile ? '10%' : '5%',
                top: 'auto',
                textStyle: {
                    color: '#ccc',
                    fontSize: mobile ? 10 : 14
                },
                pageTextStyle: { color: '#fff' },
                type: 'scroll'
            },
            grid: {
                left: mobile ? '5%' : '3%',
                right: mobile ? '5%' : '4%',
                top: mobile ? '20%' : '17%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: times,
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    rotate: mobile ? 45 : 0
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: '增粉数量',
                nameLocation: 'end',
                nameTextStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 10 : 14,
                    fontFamily: 'Helvetica',
                    align: 'right'
                },
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    formatter: function(value) {
                        return value;
                    }
                },
                splitLine: { lineStyle: { color: '#333333' } }
            },
            series: series
        };

        line2Chart.setOption(option);
    }

    // 初始化图表3 (增粉图表)
    function initARPUChart() {
        const series = buildARPUSeries();
        const mobile = isMobile();
        const option = {
            backgroundColor: '#000000',
            textStyle: {
                color: '#ffffff',
                fontFamily: 'Helvetica',
                fontSize: mobile ? 12 : 14
            },
            title: {
                text: 'FY25-FY26 微信直充活动ARPU对比',
                left: 'center',
                top: mobile ? 20 : 20,
                textStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 14 : 16
                }
            },
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(50,50,50,0.9)',
                confine:true,
                borderColor: '#777',
                borderWidth: 1,
                textStyle: { color: '#fff' },
                formatter: function(params) {
                    let result = `<b>${params[0].axisValue}</b><br/>`;
                    params.forEach(item => {
                        result += `${item.marker} ${item.seriesName}: ${item.value}<br/>`;
                    });
                    return result;
                }
            },
            legend: {
                orient: mobile ? 'vertical':'horizontal',
                left: 'center',
                bottom: mobile ? '3%' : '5%',
                top: 'auto',
                itemGap: mobile ? 8 : 15,
                itemWidth: mobile ? 20 : 25,
                itemHeight: mobile ? 12 : 14,
                textStyle: {
                    color: '#ccc',
                    fontSize: mobile ? 10 : 14
                },
                pageTextStyle: { color: '#fff' },
                type: 'scroll'
            },
            grid: {
                left: mobile ? '5%' : '3%',
                right: mobile ? '5%' : '4%',
                top: mobile ? '20%' : '17%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: times,
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    rotate: mobile ? 45 : 0
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: 'ARPU',
                nameLocation: 'end',
                nameTextStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 10 : 14,
                    fontFamily: 'Helvetica',
                    align: 'right'
                },
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    formatter: function(value) {
                        return value;
                    }
                },
                splitLine: { lineStyle: { color: '#333333' } }
            },
            series: series
        };

        line3Chart.setOption(option);
    }

    // 初始化图表4
        function initCCChart() {
        const series = buildARPUSeries();
        const mobile = isMobile();
        const option = {
            backgroundColor: '#000000',
            textStyle: {
                color: '#ffffff',
                fontFamily: 'Helvetica',
                fontSize: mobile ? 12 : 14
            },
            title: {
                text: 'FY25-FY26 微信直充活动客服咨询数对比',
                left: 'center',
                top: mobile ? 20 : 20,
                textStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 14 : 16
                }
            },
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(50,50,50,0.9)',
                borderColor: '#777',
                borderWidth: 1,
                confine:true,
                textStyle: { color: '#fff' },
                formatter: function(params) {
                    let result = `<b>${params[0].axisValue}</b><br/>`;
                    params.forEach(item => {
                        result += `${item.marker} ${item.seriesName}: ${item.value}<br/>`;
                    });
                    return result;
                }
            },
            legend: {
                orient: mobile ? 'vertical':'horizontal',
                left: 'center',
                bottom: mobile ? '3%' : '5%',
                top: 'auto',
                itemGap: mobile ? 8 : 15,
                itemWidth: mobile ? 20 : 25,
                itemHeight: mobile ? 12 : 14,
                textStyle: {
                    color: '#ccc',
                    fontSize: mobile ? 10 : 14
                },
                pageTextStyle: { color: '#fff' },
                type: 'scroll'
            },
            grid: {
                left: mobile ? '5%' : '3%',
                right: mobile ? '5%' : '4%',
                top: mobile ? '20%' : '17%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: times,
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    rotate: mobile ? 45 : 0
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: '咨询数量',
                nameLocation: 'end',
                nameTextStyle: {
                    color: '#ffffff',
                    fontSize: mobile ? 10 : 14,
                    fontFamily: 'Helvetica',
                    align: 'right'
                },
                axisLine: { lineStyle: { color: '#ffffff' } },
                axisLabel: {
                    color: '#ffffff',
                    fontFamily: 'Helvetica',
                    fontSize: mobile ? 10 : 12,
                    formatter: function(value) {
                        return value;
                    }
                },
                splitLine: { lineStyle: { color: '#333333' } }
            },
            series: series
        };

        line4Chart.setOption(option);
    }

    // 先初始化图表，然后加载JSON数据更新
    initChart();
    initFollowerChart();
    initARPUChart();
    initCCChart();
    loadDataFile().then((success) => {
        if (success) {
            updateChart();
            // 更新标题
            lineChart.setOption({
                title: { text: 'FY25-FY26 微信直充活动销售对比' }
            });
            line2Chart.setOption({
                title: { text: 'FY26 June 官微累计增粉数据' }
            });
            line3Chart.setOption({
                title: { text: 'FY25-FY26 微信直充活动ARPU对比' }
            });
        }
    });

    // 监听窗口大小变化，移动端/桌面端切换时重新初始化
    let lastIsMobile = isMobile();
    window.addEventListener('resize', () => {
        lineChart.resize();
        line2Chart.resize();
        line3Chart.resize();
        line4Chart.resize();
        const currentIsMobile = isMobile();
        if (currentIsMobile !== lastIsMobile) {
            lastIsMobile = currentIsMobile;
            lineChart.clear();
            line2Chart.clear();
            line3Chart.clear();
            line4Chart.resize();
            initChart();
            initFollowerChart();
            initARPUChart();
            initCCChart();
        }
    });
</script>
</body>
</html>
