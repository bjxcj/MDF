    .btn {

  // 节点名称映射（内部唯一节点名 → 当前展示名称，左侧包含流失率）

  // ---------- 文字配置 ----------

  // ---------- 透明度配置 ----------

  // ---------- 桑基图布局配置 ----------

  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;



  // 流向数据（静态）
  const links = [

{ source: 'left_京东', target: 'right_抖音电商', value:7138},

{ source: 'left_抖音电商', target: 'right_抖音电商', value:31450},
{ source: 'left_抖音电商', target: 'right_京东', value:6445},
{ source: 'left_抖音电商', target: 'right_天猫天机平台', value:2390},
{ source: 'left_抖音电商', target: 'right_微信直充', value:931},
{ source: 'left_抖音电商', target: 'right_福禄B2B', value:1485},
{ source: 'left_抖音电商', target: 'right_腾瑞明B2B', value:936},
{ source: 'left_抖音电商', target: 'right_其他渠道', value:2133},

{ source: 'left_其他渠道', target: 'right_福禄B2B', value:2131},
{ source: 'left_其他渠道', target: 'right_腾瑞明B2B', value:1457},
{ source: 'left_其他渠道', target: 'right_流失', value:114465},

  ];

  // 从 links 动态提取左侧和右侧渠道列表
  const leftChannels = [...new Set(links.map(l => l.source.replace('left_', '')))];
  const rightChannels = [...new Set(links.map(l => l.target.replace('right_', '')))];

  // 计算渠道流失率
  function getLossRate(channel) {
    const sourceLinks = links.filter(l => l.source === `left_${channel}` && l.target === 'right_流失');
    const lossVal = sourceLinks.length > 0 ? sourceLinks[0].value : 0;
    const totalLinks = links.filter(l => l.source === `left_${channel}`);
    const totalVal = totalLinks.reduce((sum, l) => sum + l.value, 0);
    return totalVal > 0 ? lossVal / totalVal : 0;
  }

  // 获取渠道总用户数（流出量）
  function getTotalOutflow(channel) {
    const sourceLinks = links.filter(l => l.source === `left_${channel}`);
    return sourceLinks.reduce((sum, l) => sum + l.value, 0);
  }

  // 获取排序后的左侧渠道：按流失率升序，流失率相同时按用户数降序
  function getSortedLeftChannels() {
    const channelStats = [];
    leftChannels.forEach(ch => {
      const lossLinks = links.filter(l => l.source === `left_${ch}` && l.target === 'right_流失');
      const lossVal = lossLinks.length > 0 ? lossLinks[0].value : 0;
      const totalLinks = links.filter(l => l.source === `left_${ch}`);
      const totalVal = totalLinks.reduce((sum, l) => sum + l.value, 0);
      channelStats.push({
        name: ch,
        lossVal: lossVal,
        totalVal: totalVal
      });
    });
    channelStats.sort((a, b) => {
      const rateA = a.lossVal * b.totalVal;
      const rateB = b.lossVal * a.totalVal;
      if (rateA !== rateB) {
        return rateA - rateB;
      }
      return b.totalVal - a.totalVal;
    });
    return channelStats.map(c => c.name);
  }

  // 获取排序后的右侧渠道：按用户增长率降序，流失在最下方
  function getSortedRightChannels() {
    const channelStats = [];
    rightChannels.forEach(ch => {
      if (ch !== '流失') {
        // 计算流入量（右侧该渠道的总用户数）
        const targetLinks = links.filter(l => l.target === `right_${ch}`);
        const inflowVal = targetLinks.reduce((sum, l) => sum + l.value, 0);
        // 计算流出量（左侧该渠道的原用户数）
        const sourceLinks = links.filter(l => l.source === `left_${ch}`);
        const outflowVal = sourceLinks.reduce((sum, l) => sum + l.value, 0);
        // 计算增长率 = (流入 - 流出) / 流出，左侧没有则为 Infinity
        const growthRate = outflowVal > 0 ? (inflowVal - outflowVal) / outflowVal : Infinity;
        channelStats.push({
          name: ch,
          inflowVal: inflowVal,
          outflowVal: outflowVal,
          growthRate: growthRate
        });
      }
    });
    // 按增长率降序排列，增长率相同（如都是Infinity）则按流入量降序
    channelStats.sort((a, b) => {
      if (b.growthRate !== a.growthRate) {
        return b.growthRate - a.growthRate;
      }
      return b.inflowVal - a.inflowVal;
    });
    return [...channelStats.map(c => c.name), '流失'];
  }

  // 构建左侧节点数据（已排序）
  function buildLeftNodes() {
    const leftNodes = getSortedLeftChannels().map(ch => {
      const channelId = `left_${ch}`;
      const showName = ch === 'FY26_1H_New' ? 'FY26 1H New' : ch;

      // 计算流失率
      const lossRate = getLossRate(ch);
      const lossRatePercent = (lossRate * 100).toFixed(2);

      // 在渠道名称后添加流失率
      const displayName = `${showName} (${lossRatePercent}%)`;

      // 更新nodeNameMap
      nodeNameMap[channelId] = displayName;

      return {
        id: channelId,      // 唯一标识符
        name: displayName,   // 显示名称（包含流失率）
        label: {
          formatter: displayName,
          position: 'left',
          color: CONFIG_FONT_COLOR
        },
        depth: 0,
        itemStyle: { color: channelColorMap.get(ch) }
      };
    });

    return leftNodes;
  }

  // 构建右侧节点数据（已排序）
  function buildRightNodes() {
    const rightNodes = getSortedRightChannels().map(ch => {
      const channelId = `right_${ch}`;

      // 更新nodeNameMap
      nodeNameMap[channelId] = ch;

      return {
        id: channelId,      // 唯一标识符
        name: ch,            // 显示名称
        label: {
          formatter: ch,
          position: 'right',
          color: CONFIG_FONT_COLOR
        },
        depth: 1,
        itemStyle: { color: channelColorMap.get(ch) }
      };
    });

    return rightNodes;
  }

  // 合并左右两侧节点
  const nodes = [...buildLeftNodes(), ...buildRightNodes()];

  const option = {
    title: {
      text: CONFIG_TITLE,
      left: 'center',
      textStyle: {
        color: CONFIG_FONT_COLOR,
        fontSize: isMobile ? mobileConfig.titleFontSize : 24,
        fontFamily: CONFIG_FONT_FAMILY,
        width: isMobile ? window.innerWidth-20 : null,
        overflow: 'truncate',
        ellipsis: '..'
      }
    },
    graphic: [
      {
        type: 'text',
        left: isMobile ? mobileConfig.graphic_padding : layoutConfig.leftPadding - 40,
        top: 30,
        style: {
          text: CONFIG_LEFT_SUBTITLE,
          fontSize: isMobile ? mobileConfig.subtitleFontSize : 14,
          lineHeight: isMobile ? mobileConfig.subtitleLineHeight : 20,
          fill: CONFIG_FONT_COLOR,
          fontFamily: CONFIG_FONT_FAMILY
        }
      },
      {
        type: 'text',
        right: isMobile ? mobileConfig.graphic_padding : layoutConfig.rightPadding - 40,
        top: 30,
        style: {
          text: CONFIG_RIGHT_SUBTITLE,
          textAlign: 'right',
          fontSize: isMobile ? mobileConfig.subtitleFontSize : 14,
          lineHeight: isMobile ? mobileConfig.subtitleLineHeight : 20,
          fill: CONFIG_FONT_COLOR,
          fontFamily: CONFIG_FONT_FAMILY
        }
      }
    ],
    tooltip: {
      trigger: styleConfig.tooltipTrigger,
      confine: styleConfig.tooltipConfine,
      position: function(point, params, dom, rect, size) {
        const x = point[0];
        const y = point[1];
        const viewWidth = size.viewSize[0];
        const viewHeight = size.viewSize[1];
        const tooltipWidth = size.contentSize[0];
        const tooltipHeight = size.contentSize[1];

        let newX = x + 15;
        let newY = y;

        // 如果右侧超出，显示在左侧
        if (newX + tooltipWidth > viewWidth) {
          newX = x - tooltipWidth - 10;
        }

        // 如果底部超出，向上移动
        if (newY + tooltipHeight > viewHeight) {
          newY = viewHeight - tooltipHeight - 10;
        }

        // 如果顶部超出，显示在下方
        if (newY < 0) {
          newY = y + 10;
        }

        return [newX, newY];
      },
      formatter: function (params) {
        // 数字千位分隔格式化函数
        const fmt = (n) => n.toLocaleString('zh-CN');

        // 悬浮在线条：保持原有格式
        if (params.data.source && params.data.target) {
          const s = originalNodeNameMap[params.data.source];
          const t = originalNodeNameMap[params.data.target];
          return `${s} to ${t} ：${fmt(params.data.value)}人`;
        }

        // 悬浮在节点：渠道名称：总用户数 + 该节点所有上下游流向明细（表格对齐）
        // 优先使用 id 获取内部唯一标识符
        let nodeKey = params.data && params.data.id ? params.data.id : params.name;
        const nodeShowName = originalNodeNameMap[nodeKey] || nodeKey;
        let tip = `<strong>${nodeShowName}：${fmt(params.value)}人</strong><br/>`;
        tip += '<table style="border-collapse:collapse; margin-top:5px;">';

        // 遍历所有连线，找出当前节点所有流入、流出数据
        const relatedLinks = [];
        let lossCount = 0;
        links.forEach(link => {
          const sourceName = originalNodeNameMap[link.source];
          const targetName = originalNodeNameMap[link.target];
          if (link.source === nodeKey || link.target === nodeKey) {
            relatedLinks.push({
              sourceName,
              targetName,
              value: link.value,
              isLoss: targetName === '流失',
              isFY26New: sourceName === 'FY26 1H New'
            });
            if (targetName === '流失') {
              lossCount += link.value;
            }
          }
        });

        // 排序：非FY26 1H New按数值降序，FY26 1H New放在最后（流失在FY26 1H New之前）
        relatedLinks.sort((a, b) => {
          // FY26 1H New 排在最后
          if (a.isFY26New && !b.isFY26New) return 1;
          if (!a.isFY26New && b.isFY26New) return -1;
          // 流失排在最后（在 FY26 1H New 之前）
          if (a.isLoss && !b.isLoss) return 1;
          if (!a.isLoss && b.isLoss) return -1;
          return b.value - a.value;
        });

        // 输出排序后的连线数据（表格形式）
        relatedLinks.forEach(link => {
          // 左侧渠道只显示 "to 右侧渠道名称"，右侧渠道显示完整格式
          if (nodeKey.startsWith('left_')) {
            tip += `<tr><td style="padding:2px 10px 2px 0;">to ${link.targetName}</td><td style="text-align:right; padding:2px 0;">${fmt(link.value)}人</td></tr>`;
          } else {
            tip += `<tr><td style="padding:2px 10px 2px 0;">${link.sourceName} to</td><td style="text-align:right; padding:2px 0;">${fmt(link.value)}人</td></tr>`;
          }
        });

        tip += '</table>';

        // 添加流失率（仅左侧渠道显示）
        if (lossCount > 0 && params.value > 0 && nodeKey.startsWith('left_')) {
          tip += `\n流失率：${((lossCount / params.value) * 100).toFixed(2)}%`;
        }

        // 添加增长率（仅右侧渠道显示）
        if (nodeKey.startsWith('right_') && nodeShowName !== '流失') {
          const targetLinks = links.filter(l => l.target === nodeKey);
          const inflowVal = targetLinks.reduce((sum, l) => sum + l.value, 0);
          // 查找对应的左侧渠道
          const leftNodeKey = nodeKey.replace('right_', 'left_');
          const sourceLinks = links.filter(l => l.source === leftNodeKey);
          const outflowVal = sourceLinks.reduce((sum, l) => sum + l.value, 0);
          if (outflowVal > 0) {
            const growthRate = ((inflowVal - outflowVal) / outflowVal) * 100;
            const sign = growthRate >= 0 ? '+' : '';
            tip += `\n增长率：${sign}${growthRate.toFixed(2)}%`;
          } else {
            // 左侧没有该渠道（纯新增渠道），增长率为无穷大
            tip += `\n增长率：∞（新增）`;
          }
        }

        return tip;
      }
    },
    series: [{
      type: 'sankey',
      left: isMobile ? mobileConfig.padding : layoutConfig.leftPadding,
      top: isMobile ? mobileConfig.padding + 10 : layoutConfig.topPadding,
      right: isMobile ? mobileConfig.padding : layoutConfig.rightPadding,
      bottom: layoutConfig.bottomPadding,
      data: nodes,
      links: links,
      layoutIterations: layoutConfig.layoutIterations,
      nodeAlign: layoutConfig.nodeAlign,
      nodeWidth: isMobile ? mobileConfig.nodeWidth : layoutConfig.nodeWidth,
      lineStyle: {
        color: layoutConfig.line_color,
        curveness: isMobile ? mobileConfig.curveness : layoutConfig.curveness,
        opacity: opacityConfig.normal
      },
      label: {
        show: true,
        fontSize: isMobile ? mobileConfig.labelFontSize : 14,
        fontFamily: CONFIG_FONT_FAMILY,
        width: isMobile ? mobileConfig.labelWidth : layoutConfig.labelWidth,
        overflow: isMobile ? 'truncate' : null,
        textOverflow: isMobile ? 'ellipsis' : null
      },
      emphasis: {
        focus: 'none',
        lineStyle: {
          opacity: opacityConfig.highlight,
          width: highlightConfig.lineWidth
        },
        itemStyle: {
          opacity: opacityConfig.highlight
        },
        label: {
          show: true,
          fontWeight: 'bold'
        }
      },
      draggable: styleConfig.draggable
    }]
  };

  const chart = echarts.init(document.getElementById('main'));
  chart.setOption(option);
  window.addEventListener('resize', () => chart.resize());

  // 自定义高亮逻辑（支持节点、标签、线条悬停）
  function handleHighlight(params) {
    // 调试日志 - 可以在浏览器控制台查看
    console.log('hover params:', params.name, params.data);

    if (params.componentType !== 'series' || params.seriesType !== 'sankey' || isAutoHighlighting) {
      return;
    }

    // 尝试获取节点名称
    let nodeName = null;
    let edgeSource = null;
    let edgeTarget = null;

    // 首先检查是否是线条（通过 data.source !== undefined 判断，优先于其他检测）
    if (params.data && params.data.source !== undefined && params.data.target !== undefined) {
      edgeSource = params.data.source;
      edgeTarget = params.data.target;
      // 线条悬停时，使用 target 作为主要节点
      nodeName = edgeTarget;
    } else {
      // 尝试从多个位置获取节点 id 或 name
      // params.data 存在且有 id
      if (params.data && (params.data.id || params.data.name)) {
        nodeName = params.data.id || params.data.name;
      }
      // params.name 存在
      else if (params.name) {
        nodeName = params.name;
      }
    }

    if (!nodeName) return;

    // 如果 nodeName 是显示名称（如"京东"），查找对应的内部名称
    // 优先根据前缀匹配：左侧标签匹配 left_xxx，右侧标签匹配 right_xxx
    if (!nodeNameMap[nodeName]) {
      let leftMatch = null;
      let rightMatch = null;
      // 反向查找：显示名称 -> 内部名称（需要在originalNodeNameMap中查找）
      for (const [key, value] of Object.entries(originalNodeNameMap)) {
        if (value === nodeName) {
          if (key.startsWith('left_')) {
            leftMatch = key;
            break; // 优先匹配左侧，找到即停止
          } else if (key.startsWith('right_')) {
            rightMatch = key;
          }
        }
      }
      // 如果找到左侧匹配用左侧，否则用右侧匹配
      nodeName = leftMatch || rightMatch;
    }

    // 再次检查是否存在
    if (!nodeName || !originalNodeNameMap[nodeName]) return;

    const channelName = originalNodeNameMap[nodeName];

    // 找到所有需要高亮的节点和链接
    const highlightNodes = new Set();
    const highlightLinks = new Set();

    // 高亮当前节点
    highlightNodes.add(nodeName);

    // 如果是线条悬停，直接高亮该线条
    if (edgeSource && edgeTarget) {
      links.forEach((link, index) => {
        if (link.source === edgeSource && link.target === edgeTarget) {
          highlightLinks.add(index);
          highlightNodes.add(edgeSource);
          highlightNodes.add(edgeTarget);
        }
      });
    } else {
      // 节点悬停逻辑：找到同名渠道（跨左右两侧）
      const sameNameNodes = nodes.filter(n => originalNodeNameMap[n.id] === channelName);
      sameNameNodes.forEach(n => highlightNodes.add(n.id));

      // 找到所有与当前节点相关的链接
      links.forEach((link, index) => {
        if (link.source === nodeName || link.target === nodeName) {
          highlightLinks.add(index);
          highlightNodes.add(link.source);
          highlightNodes.add(link.target);

          // 对于右侧节点，高亮其下游节点
          if (link.source === nodeName) {
            const findDownstream = (target) => {
              links.forEach((l, i) => {
                if (l.source === target) {
                  highlightLinks.add(i);
                  highlightNodes.add(l.source);
                  highlightNodes.add(l.target);
                  findDownstream(l.target);
                }
              });
            };
            findDownstream(link.target);
          }

          // 对于左侧节点，高亮其上游节点
          if (link.target === nodeName) {
            const findUpstream = (source) => {
              links.forEach((l, i) => {
                if (l.target === source) {
                  highlightLinks.add(i);
                  highlightNodes.add(l.source);
                  highlightNodes.add(l.target);
                  findUpstream(l.source);
                }
              });
            };
            findUpstream(link.source);
          }
        }
      });
    }

    // 构建新的 series 数据，设置透明度
    const newNodes = nodes.map(n => ({
      ...n,
      itemStyle: {
        ...n.itemStyle,
        opacity: highlightNodes.has(n.id) ? highlightConfig.nodeOpacity : highlightConfig.blurNodeOpacity
      },
      label: {
        ...n.label,
        opacity: highlightNodes.has(n.id) ? highlightConfig.labelOpacity : highlightConfig.blurLabelOpacity
      }
    }));

    const newLinks = links.map((l, i) => ({
      ...l,
      lineStyle: {
        opacity: highlightLinks.has(i) ? opacityConfig.highlightLine : opacityConfig.blurLine,
        width: highlightLinks.has(i) ? highlightConfig.lineWidth : highlightConfig.normalLineWidth
      }
    }));

    chart.setOption({
      series: [{
        data: newNodes,
        links: newLinks
      }]
    });
  }

  // 绑定 mouseover 和 mousemove 事件
  chart.on('mouseover', handleHighlight);
  chart.on('mousemove', handleHighlight);

  // 鼠标移出时恢复原始状态
  chart.on('mouseout', function(params) {
    if (params.componentType === 'series' && params.seriesType === 'sankey' && !isAutoHighlighting) {
      restoreOriginalState();
    }
  });

  // 使用 zrender 底层事件捕获标签悬停
  chart.getZr().on('mousemove', function(event) {
    if (isAutoHighlighting) return;

    // 尝试通过 containPixel 检测
    const point = [event.offsetX, event.offsetY];
    if (chart.containPixel({ seriesIndex: 0 }, point)) {
      // 如果在系列区域内，触发高亮检查
      // 这里我们依赖 chart.on('mousemove') 已经处理了大部分情况
    } else {
      // 鼠标不在系列区域内，恢复原始状态
      restoreOriginalState();
    }
  });

  // 左侧渠道依次高亮效果（一圈后停止）
  let highlightIndex = -1;
  let highlightInterval = null;
  let highlightCount = 0;
  let isAutoHighlighting = false;
  const leftNodeNames = getSortedLeftChannels().map(ch => `left_${ch}`);

  function highlightLeftChannel() {
    // 隐藏上一个 tooltip
    chart.dispatchAction({
      type: 'hideTip'
    });

    // 取消上一个高亮
    if (highlightIndex >= 0) {
      chart.dispatchAction({
        type: 'downplay',
        dataIndex: highlightIndex
      });
    }

    // 移动到下一个
    highlightIndex = (highlightIndex + 1) % leftNodeNames.length;
    highlightCount++;
    isAutoHighlighting = true;

    // 获取当前要高亮的节点名
    const currentNodeName = leftNodeNames[highlightIndex];

    // 使用自定义高亮逻辑
    highlightRelatedNodes(currentNodeName);

    // 显示 tooltip
    chart.dispatchAction({
      type: 'showTip',
      seriesIndex: 0,
      dataIndex: highlightIndex
    });

    // 完成一圈后延迟停止，让最后一个渠道也能完整显示
    if (highlightCount >= leftNodeNames.length) {
      setTimeout(() => {
        stopHighlight();
        // 恢复原始状态
        restoreOriginalState();
      }, isMobile ? highlightConfig.autoInterval * 0.67 : highlightConfig.lastShowDelay);
    }
  }

  // 高亮相关节点的函数
  function highlightRelatedNodes(nodeName) {
    const channelName = originalNodeNameMap[nodeName];

    // 找到所有需要高亮的节点和链接
    const highlightNodes = new Set();
    const highlightLinks = new Set();

    highlightNodes.add(nodeName);

    // 找到同名渠道
    const sameNameNodes = nodes.filter(n => originalNodeNameMap[n.id] === channelName);
    sameNameNodes.forEach(n => highlightNodes.add(n.id));

    // 找到所有与当前节点相关的链接
    links.forEach((link, index) => {
      if (link.source === nodeName || link.target === nodeName) {
        highlightLinks.add(index);
        highlightNodes.add(link.source);
        highlightNodes.add(link.target);

        if (link.source === nodeName) {
          const findDownstream = (target) => {
            links.forEach((l, i) => {
              if (l.source === target) {
                highlightLinks.add(i);
                highlightNodes.add(l.source);
                highlightNodes.add(l.target);
                findDownstream(l.target);
              }
            });
          };
          findDownstream(link.target);
        }

        if (link.target === nodeName) {
          const findUpstream = (source) => {
            links.forEach((l, i) => {
              if (l.target === source) {
                highlightLinks.add(i);
                highlightNodes.add(l.source);
                highlightNodes.add(l.target);
                findUpstream(l.source);
              }
            });
          };
          findUpstream(link.source);
        }
      }
    });

    // 构建新的 series 数据
    const newNodes = nodes.map(n => ({
      ...n,
      itemStyle: {
        ...n.itemStyle,
        opacity: highlightNodes.has(n.id) ? highlightConfig.nodeOpacity : highlightConfig.blurNodeOpacity
      },
      label: {
        ...n.label,
        opacity: highlightNodes.has(n.id) ? highlightConfig.labelOpacity : highlightConfig.blurLabelOpacity
      }
    }));

    const newLinks = links.map((l, i) => ({
      ...l,
      lineStyle: {
        opacity: highlightLinks.has(i) ? opacityConfig.highlightLine : opacityConfig.blurLine,
        width: highlightLinks.has(i) ? highlightConfig.lineWidth : highlightConfig.normalLineWidth
      }
    }));

    chart.setOption({
      series: [{
        data: newNodes,
        links: newLinks
      }]
    });
  }

  // 恢复原始状态
  function restoreOriginalState() {
    const originalNodes = nodes.map(n => ({
      ...n,
      itemStyle: {
        ...n.itemStyle,
        opacity: opacityConfig.nodeNormal
      },
      label: {
        ...n.label,
        opacity: highlightConfig.labelOpacity
      }
    }));

    const originalLinks = links.map(l => ({
      ...l,
      lineStyle: {
        opacity: opacityConfig.normal,
        width: highlightConfig.normalLineWidth
      }
    }));

    chart.setOption({
      series: [{
        data: originalNodes,
        links: originalLinks
      }]
    });
  }

  function startHighlight() {
    if (highlightInterval) return;
    highlightInterval = setInterval(highlightLeftChannel, isMobile ? highlightConfig.autoInterval * 0.67 : highlightConfig.autoInterval);
  }

  function stopHighlight() {
    if (highlightInterval) {
      clearInterval(highlightInterval);
      highlightInterval = null;
    }
    isAutoHighlighting = false;
    // 隐藏 tooltip
    chart.dispatchAction({
      type: 'hideTip'
    });
  }

  // 鼠标移入停止，移出继续
  chart.getZr().on('mouseenter', function() {
    stopHighlight();
  });
  chart.getZr().on('mouseleave', function() {
    restoreOriginalState();
    startHighlight();
  });

  // 启动高亮轮播
  startHighlight();
</script>
</body>
